services:
  matrix-dashboard:
    build:
      context: ../..
      dockerfile: apps/web-dashboard/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../apps/web-dashboard/.env.production
    ports:
      - "127.0.0.1:3020:3020"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3020/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/apps/web-dashboard/.next/cache
    networks:
      - matrix-internal
networks:
  matrix-internal:
    name: matrix-internal
