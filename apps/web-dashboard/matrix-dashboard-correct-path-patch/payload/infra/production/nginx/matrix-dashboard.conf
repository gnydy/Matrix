limit_req_zone $binary_remote_addr zone=matrix_dashboard_login:10m rate=10r/m;
upstream matrix_dashboard { server 127.0.0.1:3020; keepalive 32; }
server {
  listen 80;
  server_name admin.example.com;
  return 301 https://$host$request_uri;
}
server {
  listen 443 ssl http2;
  server_name admin.example.com;
  ssl_certificate /etc/letsencrypt/live/admin.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
  client_max_body_size 20m;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  location = /api/auth/login { limit_req zone=matrix_dashboard_login burst=4 nodelay; proxy_pass http://matrix_dashboard; include proxy_params; proxy_set_header X-Forwarded-Proto https; }
  location / { proxy_pass http://matrix_dashboard; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_read_timeout 60s; }
}
